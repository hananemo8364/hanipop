<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hahahahahahhhaahahah
    </title>


    <style>
        html {
            font-size: 100%;
        }




        .salam {
            background-color: #f39c12;
            padding: 0.5rem;
            display: grid;
            grid-template-columns: 10rem 10rem 10rem 10rem 10rem 10rem;
            grid-template-rows: 10rem 10rem 10rem 10rem 10rem 10rem 10rem 10rem;
        }



        .item {
            font-size: 1.5rem;
            background-color: white;
            margin: 1rem;
            padding: 4rem;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;

        }

        .item-1 {
            grid-column-start: 1;
            grid-column-end: 7;
        }

        .item-2 {
            grid-column-start: 1;
            grid-column-end: 5;
            grid-row-start: 2;
            grid-row-end: 5;
        }

        .item-3 {
            grid-column-start: 5;
            grid-column-end: 7;
            grid-row-start: 2;
            grid-row-end: 5;
        }

        .item-4 {
            grid-column-start: 1;
            grid-column-end: 7;
            grid-row-start: 5;
            grid-row-end: 7;
        }

        .item-5 {
            grid-column-start: 1;
            grid-column-end: 4;
            grid-row-start: 7;
            grid-row-end: 8;
        }

        .item-6 {
            grid-column-start: 1;
            grid-column-end: 7;
            grid-row-start: 8;
            grid-row-end: 9;
        }

        a{
            color: black;
        }







    </style>


</head>

<body>

    <div class="salam">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
        <div class="item item-5">5</div>
        <div class="item item-6"><a href="index.html">دکمه برگشتن به سایت اصلی</a></div>
    </div>




</body>

</html>
